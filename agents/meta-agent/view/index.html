<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meta Agent - Task Board</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0a0a0f;
      --bg2:       #11111b;
      --bg3:       #18182a;
      --bg4:       #22223a;
      --hover:     #2a2a42;
      --text:      #e8e8f0;
      --text2:     #8888aa;
      --text3:     #44445a;
      --border:    #1e1e32;
      --border2:   #2a2a48;
      --accent:    #7c6ff7;
      --accent2:   #a89cff;
      --accent-bg: rgba(124,111,247,.12);
      --green:     #10b981;
      --green-bg:  rgba(16,185,129,.1);
      --amber:     #f59e0b;
      --amber-bg:  rgba(245,158,11,.1);
      --red:       #ef4444;
      --red-bg:    rgba(239,68,68,.1);
      --blue:      #3b82f6;
      --blue-bg:   rgba(59,130,246,.1);
      --r:         8px;
      --r2:        14px;
      --trans:     160ms cubic-bezier(.4,0,.2,1);
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); }
    body { font-family: -apple-system,BlinkMacSystemFont,'Inter','SF Pro Display','Segoe UI',sans-serif; font-size: 13px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .header {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    .logo { font-size: 18px; }
    .header-title { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    .stats { display: flex; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
    .stat-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 500;
      border: 1px solid var(--border2);
      background: var(--bg3);
      color: var(--text2);
    }
    .stat-pill .num { color: var(--text); font-weight: 700; }
    .stat-pill.urgent { border-color: rgba(239,68,68,.3); background: var(--red-bg); color: var(--red); }
    .stat-pill.urgent .num { color: var(--red); }

    .filters {
      display: flex; gap: 4px; padding: 8px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .filter-btn {
      padding: 4px 12px; border-radius: 20px;
      border: 1px solid var(--border2); background: transparent;
      color: var(--text2); cursor: pointer; font-size: 11px; font-weight: 500;
      transition: all var(--trans); font-family: inherit;
    }
    .filter-btn:hover { color: var(--text); background: var(--hover); }
    .filter-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent2); }

    .board { flex: 1; overflow-y: auto; padding: 12px 16px; }

    .task-list { display: flex; flex-direction: column; gap: 6px; }

    .task-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 10px 14px;
      transition: all var(--trans);
      cursor: default;
      border-left: 3px solid transparent;
    }
    .task-card:hover { border-color: var(--border2); background: var(--bg3); }
    .task-card.priority-urgent { border-left-color: var(--red); }
    .task-card.priority-high   { border-left-color: var(--amber); }
    .task-card.priority-normal { border-left-color: var(--accent); }
    .task-card.priority-low    { border-left-color: var(--text3); }

    .task-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .task-title { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .task-desc { font-size: 11px; color: var(--text2); margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .task-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 1px 7px; border-radius: 10px;
      font-size: 10px; font-weight: 600;
    }
    .badge-status {
      background: var(--bg4); color: var(--text2);
    }
    .badge-status.pending     { background: var(--blue-bg); color: var(--blue); }
    .badge-status.in_progress { background: var(--accent-bg); color: var(--accent2); }
    .badge-status.done        { background: var(--green-bg); color: var(--green); }
    .badge-status.cancelled   { background: var(--bg4); color: var(--text3); }
    .badge-status.delegated   { background: var(--amber-bg); color: var(--amber); }
    .badge-status.waiting_human { background: var(--amber-bg); color: var(--amber); }
    .badge-status.blocked     { background: var(--red-bg); color: var(--red); }

    .badge-priority { font-size: 9px; padding: 1px 5px; }
    .badge-priority.urgent { background: var(--red-bg); color: var(--red); }
    .badge-priority.high   { background: var(--amber-bg); color: var(--amber); }

    .task-due { font-size: 10px; color: var(--text3); margin-left: auto; }
    .task-due.overdue { color: var(--red); font-weight: 600; }
    .task-due.soon { color: var(--amber); }

    .task-progress { margin-top: 6px; }
    .progress-bar { height: 3px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width var(--trans); }

    .task-delegated { font-size: 10px; color: var(--amber); margin-top: 4px; }

    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; gap: 8px; color: var(--text2); }
    .empty-icon { font-size: 32px; opacity: .4; }
    .empty-text { font-size: 13px; }
    .empty-sub  { font-size: 11px; opacity: .6; }

    .loading { display: flex; align-items: center; justify-content: center; height: 120px; gap: 8px; color: var(--text2); font-size: 12px; }
    .spinner { width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }
  </style>
</head>
<body>
<div class="app">
  <header class="header">
    <span class="logo">⚙️</span>
    <span class="header-title">任务看板</span>
    <div class="header-right">
      <span id="refreshIndicator" style="font-size:11px;color:var(--text3);display:none">刷新中...</span>
    </div>
  </header>

  <div class="stats" id="statsBar"></div>

  <div class="filters" id="filterBar">
    <button class="filter-btn active" data-filter="active" onclick="setFilter('active')">活跃</button>
    <button class="filter-btn" data-filter="all" onclick="setFilter('all')">全部</button>
    <button class="filter-btn" data-filter="pending" onclick="setFilter('pending')">待处理</button>
    <button class="filter-btn" data-filter="in_progress" onclick="setFilter('in_progress')">进行中</button>
    <button class="filter-btn" data-filter="delegated" onclick="setFilter('delegated')">已委派</button>
    <button class="filter-btn" data-filter="done" onclick="setFilter('done')">已完成</button>
  </div>

  <div class="board" id="board">
    <div class="loading"><div class="spinner"></div><span>加载中...</span></div>
  </div>
</div>

<script>
(function() {
  'use strict';

  function agentId() { return window.LAVS_AGENT_ID || 'meta-agent'; }
  function apiBase() { return '/api/agents/' + agentId() + '/lavs'; }

  async function call(ep, input) {
    const h = { 'Content-Type': 'application/json' };
    const t = localStorage.getItem('jwt') || localStorage.getItem('auth_token') || '';
    if (t) h['Authorization'] = 'Bearer ' + t;
    const r = await fetch(apiBase() + '/' + ep, {
      method: 'POST', headers: h, body: JSON.stringify(input || {}),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    return d.result !== undefined ? d.result : d;
  }

  let currentFilter = 'active';
  let allTasks = [];

  const STATUS_LABELS = {
    pending: '待处理', in_progress: '进行中', delegated: '已委派',
    waiting_human: '等待反馈', blocked: '阻塞', done: '已完成', cancelled: '已取消'
  };
  const STATUS_ICONS = {
    pending: '⏳', in_progress: '🔄', delegated: '📤',
    waiting_human: '👤', blocked: '🚫', done: '✅', cancelled: '❌'
  };
  const PRIORITY_LABELS = { urgent: '紧急', high: '高', normal: '普通', low: '低' };

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.filter === f)
    );
    renderTasks();
  }
  window.setFilter = setFilter;

  function filterTasks(tasks) {
    if (currentFilter === 'all') return tasks;
    if (currentFilter === 'active') {
      return tasks.filter(t => !['done', 'cancelled'].includes(t.status));
    }
    return tasks.filter(t => t.status === currentFilter);
  }

  function renderStats(stats) {
    const bar = document.getElementById('statsBar');
    if (!stats) { bar.innerHTML = ''; return; }
    const items = [
      { label: '总计', val: stats.total || 0 },
      { label: '待处理', val: stats.pending || 0 },
      { label: '进行中', val: stats.in_progress || 0 },
      { label: '已委派', val: stats.delegated || 0 },
      { label: '已完成', val: stats.done || 0 },
    ];
    if (stats.urgent > 0) items.push({ label: '紧急', val: stats.urgent, cls: 'urgent' });
    if (stats.overdue > 0) items.push({ label: '过期', val: stats.overdue, cls: 'urgent' });
    bar.innerHTML = items.map(i =>
      `<span class="stat-pill ${i.cls || ''}">${i.label} <span class="num">${i.val}</span></span>`
    ).join('');
  }

  function formatDue(dueAt) {
    if (!dueAt) return null;
    const due = new Date(dueAt);
    const now = new Date();
    const diff = due - now;
    const hours = diff / (1000 * 60 * 60);

    let text = due.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
    const time = due.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    text += ' ' + time;

    let cls = '';
    if (diff < 0) cls = 'overdue';
    else if (hours < 24) cls = 'soon';

    if (diff < 0) text = '已过期 · ' + text;
    return { text, cls };
  }

  function renderTasks() {
    const board = document.getElementById('board');
    const filtered = filterTasks(allTasks);

    if (filtered.length === 0) {
      board.innerHTML = `<div class="empty">
        <span class="empty-icon">${currentFilter === 'active' ? '🎉' : '📭'}</span>
        <span class="empty-text">${currentFilter === 'active' ? '没有活跃任务' : '没有匹配的任务'}</span>
        <span class="empty-sub">在对话中告诉 Meta Agent 你的任务</span>
      </div>`;
      return;
    }

    board.innerHTML = '<div class="task-list">' + filtered.map(t => {
      const due = formatDue(t.dueAt);
      const showProgress = t.progress != null && t.progress > 0 && t.status !== 'done';
      const showDelegated = t.status === 'delegated' && t.delegatedTo;

      return `<div class="task-card priority-${t.priority || 'normal'}">
        <div class="task-top">
          <span class="task-title">${esc(t.title)}</span>
          ${t.priority === 'urgent' || t.priority === 'high'
            ? `<span class="badge badge-priority ${t.priority}">${PRIORITY_LABELS[t.priority]}</span>`
            : ''}
        </div>
        ${t.description ? `<div class="task-desc">${esc(t.description)}</div>` : ''}
        <div class="task-meta">
          <span class="badge badge-status ${t.status}">${STATUS_ICONS[t.status] || ''} ${STATUS_LABELS[t.status] || t.status}</span>
          ${t.tags?.length ? t.tags.map(tag => `<span class="badge" style="background:var(--bg4);color:var(--text3)">#${esc(tag)}</span>`).join('') : ''}
          ${due ? `<span class="task-due ${due.cls}">${due.text}</span>` : ''}
        </div>
        ${showProgress ? `<div class="task-progress"><div class="progress-bar"><div class="progress-fill" style="width:${t.progress}%"></div></div></div>` : ''}
        ${showDelegated ? `<div class="task-delegated">→ 委派给 ${esc(t.delegatedTo.agentName || t.delegatedTo.agentId || 'Agent')}</div>` : ''}
      </div>`;
    }).join('') + '</div>';
  }

  async function loadData() {
    try {
      const [tasks, stats] = await Promise.all([
        call('listTasks', {}),
        call('getStats', {}),
      ]);
      allTasks = Array.isArray(tasks) ? tasks : [];
      renderStats(stats);
      renderTasks();
    } catch (e) {
      document.getElementById('board').innerHTML =
        `<div class="empty"><span class="empty-icon">⚠️</span><span class="empty-text">${esc(e.message)}</span></div>`;
    }
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // Agent action listener for auto-refresh
  let refreshDebounce = null;
  window.addEventListener('message', (event) => {
    if (event.data?.type === 'lavs-agent-action') {
      clearTimeout(refreshDebounce);
      const ind = document.getElementById('refreshIndicator');
      ind.style.display = 'inline';
      refreshDebounce = setTimeout(async () => {
        await loadData();
        ind.style.display = 'none';
      }, 300);
    }
  });

  loadData();
})();
</script>
</body>
</html>
